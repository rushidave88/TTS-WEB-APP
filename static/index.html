<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coqui Voice Lab</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🎙️ Coqui Voice Lab</h1>
        
        <label>1. Select Language:</label>
        <select id="language" disabled><option>Loading...</option></select>

        <label>2. Choose Voice:</label>
        <div class="voice-options">
            <label><input type="radio" name="gender" value="male" checked> Male Preset</label>
            <label><input type="radio" name="gender" value="female"> Female Preset</label>
            <label><input type="radio" name="gender" value="user" id="user-opt"> Clone My Voice</label>
        </div>

        <div id="record-section" class="hidden">
            <button id="record-btn">🎤 Start Recording</button>
            <button id="stop-btn" disabled>🛑 Stop</button>
            <p id="record-status">Record 3-5 seconds of your voice.</p>
        </div>

        <label>3. Enter Text:</label>
        <textarea id="text" placeholder="Type something to synthesize..."></textarea>

        <button id="generate-btn">Generate Speech</button>
        
        <div id="spinner" class="hidden">Processing...</div>
        <audio id="audio-player" controls class="hidden"></audio>
        <p id="status-message"></p>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
